<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ heading }}</title>
</head>
<body style="margin:0; padding:0; background-color:#f3f5f4; font-family:'Segoe UI', Arial, Helvetica, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f3f5f4; padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px; width:100%; background-color:#ffffff; border-radius:12px; overflow:hidden; box-shadow:0 4px 18px rgba(13,138,130,0.10);">
          <tr>
            <td style="background-color:#0d8a82; padding:28px 32px;">
              <p style="margin:0; font-size:12px; letter-spacing:2px; text-transform:uppercase; color:#d7f3f0; font-weight:600;">Admin Panel</p>
              <h1 style="margin:6px 0 0; font-size:22px; color:#ffffff; font-weight:700;">{{ heading }}</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:32px;">
              <p style="margin:0 0 20px; font-size:14px; line-height:1.6; color:#333333;">{{ intro }}</p>
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f3f5f4; border-radius:8px; padding:16px; margin-bottom:20px;">
                <tr><td style="font-size:13px; color:#666;">Email</td></tr>
                <tr><td style="font-size:15px; color:#111; font-weight:600; padding-bottom:10px;">{{ email }}</td></tr>
                <tr><td style="font-size:13px; color:#666;">Temporary Password</td></tr>
                <tr><td style="font-size:15px; color:#111; font-weight:600; font-family:monospace;">{{ temporary_password }}</td></tr>
              </table>
              <p style="margin:0; font-size:13px; line-height:1.6; color:#666;">
                Log in and change this password immediately from your Profile page.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
